<svg width="100%" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617">
        <animate attributeName="stop-color" values="#020617;#0b0f2e;#020617" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="45%" stop-color="#0b1224"/>
      <stop offset="100%" stop-color="#1e1b4b">
        <animate attributeName="stop-color" values="#1e1b4b;#2e1065;#1e1b4b" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>

    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="55%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>

    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.5">
        <animate attributeName="stop-opacity" values="0.35;0.55;0.35" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C084FC" stop-opacity="0.32">
        <animate attributeName="stop-opacity" values="0.2;0.4;0.2" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#C084FC" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="cubeTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#93E2FF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.75"/>
    </linearGradient>
    <linearGradient id="cubeLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="cubeRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4338ca" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#2e1065" stop-opacity="0.65"/>
    </linearGradient>

    <linearGradient id="cometTail" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e0f2fe" stop-opacity="0"/>
      <stop offset="100%" stop-color="#e0f2fe" stop-opacity="0.9"/>
    </linearGradient>

    <linearGradient id="panelStroke" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#C084FC" stop-opacity="0.5"/>
    </linearGradient>

    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.3" fill="#38BDF8" opacity="0.18"/>
    </pattern>

    <filter id="cubeShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#020617" flood-opacity="0.55"/>
    </filter>

    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="dotGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>

    <clipPath id="nameClip">
      <text x="600" y="158" font-family="'Segoe UI', Inter, sans-serif" font-size="76" font-weight="800" text-anchor="middle">Abdul Rehman</text>
    </clipPath>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#dots)"/>

  <!-- perspective grid floor -->
  <g stroke="#38BDF8" stroke-opacity="0.16">
    <line x1="600" y1="230" x2="60" y2="320"/>
    <line x1="600" y1="230" x2="260" y2="320"/>
    <line x1="600" y1="230" x2="460" y2="320"/>
    <line x1="600" y1="230" x2="740" y2="320"/>
    <line x1="600" y1="230" x2="940" y2="320"/>
    <line x1="600" y1="230" x2="1140" y2="320"/>
    <line x1="120" y1="270" x2="1080" y2="270" stroke-opacity="0.1"/>
    <line x1="230" y1="295" x2="970" y2="295" stroke-opacity="0.08"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,6;0,0" dur="6s" repeatCount="indefinite"/>
  </g>

  <!-- twinkling stars -->
  <g fill="#e0f2fe">
    <circle cx="90" cy="40" r="1.6"><animate attributeName="opacity" values="0.1;1;0.1" dur="3s" begin="0s" repeatCount="indefinite"/></circle>
    <circle cx="260" cy="180" r="1.2"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="2.4s" begin="0.5s" repeatCount="indefinite"/></circle>
    <circle cx="980" cy="40" r="1.4"><animate attributeName="opacity" values="0.1;1;0.1" dur="3.4s" begin="1s" repeatCount="indefinite"/></circle>
    <circle cx="1120" cy="150" r="1.6"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="2.8s" begin="0.2s" repeatCount="indefinite"/></circle>
    <circle cx="60" cy="270" r="1.3"><animate attributeName="opacity" values="0.1;1;0.1" dur="3.6s" begin="1.4s" repeatCount="indefinite"/></circle>
    <circle cx="1150" cy="270" r="1.2"><animate attributeName="opacity" values="0.1;0.8;0.1" dur="2.6s" begin="0.8s" repeatCount="indefinite"/></circle>
    <circle cx="450" cy="30" r="1.1"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="3.1s" begin="0.3s" repeatCount="indefinite"/></circle>
    <circle cx="760" cy="270" r="1.3"><animate attributeName="opacity" values="0.1;1;0.1" dur="2.9s" begin="1.1s" repeatCount="indefinite"/></circle>
    <circle cx="400" cy="250" r="1"><animate attributeName="opacity" values="0.1;0.8;0.1" dur="2.2s" begin="0.6s" repeatCount="indefinite"/></circle>
    <circle cx="900" cy="200" r="1.1"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="3.3s" begin="1.6s" repeatCount="indefinite"/></circle>
    <circle cx="180" cy="140" r="1"><animate attributeName="opacity" values="0.1;0.7;0.1" dur="2.7s" begin="0.9s" repeatCount="indefinite"/></circle>
    <circle cx="1040" cy="280" r="1.2"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="3.5s" begin="0.4s" repeatCount="indefinite"/></circle>
  </g>

  <!-- comet sweep -->
  <g>
    <line x1="0" y1="0" x2="70" y2="0" stroke="url(#cometTail)" stroke-width="2" stroke-linecap="round">
      <animateMotion path="M -80,-20 L 1280,300" dur="7s" begin="1s" repeatCount="indefinite" rotate="auto"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.7;1" dur="7s" begin="1s" repeatCount="indefinite"/>
    </line>
  </g>

  <ellipse cx="600" cy="150" rx="440" ry="150" fill="url(#glow)"/>
  <ellipse cx="820" cy="90" rx="220" ry="110" fill="url(#glow2)"/>

  <!-- orbiting ring + satellites around hero cube -->
  <g transform="translate(150,80)">
    <circle r="58" fill="none" stroke="#38BDF8" stroke-opacity="0.35" stroke-width="1.5" stroke-dasharray="4 7">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="14s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" fill="#93E2FF" filter="url(#dotGlow)">
      <animateMotion dur="6s" repeatCount="indefinite" path="M 58,0 A 58,58 0 1 1 -58,0 A 58,58 0 1 1 58,0"/>
    </circle>
    <circle r="2.4" fill="#C084FC" filter="url(#dotGlow)">
      <animateMotion dur="9s" begin="1.5s" repeatCount="indefinite" path="M -58,0 A 58,58 0 1 1 58,0 A 58,58 0 1 1 -58,0"/>
    </circle>
  </g>

  <!-- hero cube: float > tumble > pulse, nested for combined transform -->
  <g transform="translate(150,80)" filter="url(#cubeShadow)">
    <animateTransform attributeName="transform" type="translate" values="150,80; 150,64; 150,80" dur="5s" repeatCount="indefinite"/>
    <g>
      <animateTransform attributeName="transform" type="rotate" values="-9;9;-9" dur="6s" repeatCount="indefinite"/>
      <g opacity="0.92">
        <animateTransform attributeName="transform" type="scale" values="1;1.08;1" dur="3s" repeatCount="indefinite"/>
        <polygon points="0,-34 29,-17 0,0 -29,-17" fill="url(#cubeTop)"/>
        <polygon points="-29,-17 0,0 0,34 -29,17" fill="url(#cubeLeft)"/>
        <polygon points="29,-17 0,0 0,34 29,17" fill="url(#cubeRight)"/>
      </g>
    </g>
  </g>

  <!-- cube 2 -->
  <g transform="translate(1040,70)" opacity="0.75" filter="url(#cubeShadow)">
    <animateTransform attributeName="transform" type="translate" values="1040,70; 1040,86; 1040,70" dur="4s" repeatCount="indefinite"/>
    <g>
      <animateTransform attributeName="transform" type="rotate" values="8;-8;8" dur="5s" repeatCount="indefinite"/>
      <polygon points="0,-24 20,-12 0,0 -20,-12" fill="url(#cubeTop)"/>
      <polygon points="-20,-12 0,0 0,24 -20,12" fill="url(#cubeLeft)"/>
      <polygon points="20,-12 0,0 0,24 20,12" fill="url(#cubeRight)"/>
    </g>
  </g>

  <!-- cube 3 -->
  <g transform="translate(1000,235)" opacity="0.65" filter="url(#cubeShadow)">
    <animateTransform attributeName="transform" type="translate" values="1000,235; 1000,221; 1000,235" dur="6s" repeatCount="indefinite"/>
    <g>
      <animateTransform attributeName="transform" type="rotate" values="-6;6;-6" dur="7s" repeatCount="indefinite"/>
      <polygon points="0,-18 15,-9 0,0 -15,-9" fill="url(#cubeTop)"/>
      <polygon points="-15,-9 0,0 0,18 -15,9" fill="url(#cubeLeft)"/>
      <polygon points="15,-9 0,0 0,18 15,9" fill="url(#cubeRight)"/>
    </g>
  </g>

  <!-- cube 4 -->
  <g transform="translate(120,245)" opacity="0.6" filter="url(#cubeShadow)">
    <animateTransform attributeName="transform" type="translate" values="120,245; 120,258; 120,245" dur="4.5s" repeatCount="indefinite"/>
    <g>
      <animateTransform attributeName="transform" type="rotate" values="6;-6;6" dur="4.8s" repeatCount="indefinite"/>
      <polygon points="0,-16 14,-8 0,0 -14,-8" fill="url(#cubeTop)"/>
      <polygon points="-14,-8 0,0 0,16 -14,8" fill="url(#cubeLeft)"/>
      <polygon points="14,-8 0,0 0,16 14,8" fill="url(#cubeRight)"/>
    </g>
  </g>

  <!-- cube 5 (small, upper mid-left) -->
  <g transform="translate(320,50)" opacity="0.45" filter="url(#cubeShadow)">
    <animateTransform attributeName="transform" type="translate" values="320,50; 320,40; 320,50" dur="3.6s" repeatCount="indefinite"/>
    <polygon points="0,-11 9,-5.5 0,0 -9,-5.5" fill="url(#cubeTop)"/>
    <polygon points="-9,-5.5 0,0 0,11 -9,5.5" fill="url(#cubeLeft)"/>
    <polygon points="9,-5.5 0,0 0,11 9,5.5" fill="url(#cubeRight)"/>
  </g>

  <!-- cube 6 (small, right side) -->
  <g transform="translate(890,255)" opacity="0.4" filter="url(#cubeShadow)">
    <animateTransform attributeName="transform" type="translate" values="890,255; 890,244; 890,255" dur="4.2s" repeatCount="indefinite"/>
    <polygon points="0,-10 8,-5 0,0 -8,-5" fill="url(#cubeTop)"/>
    <polygon points="-8,-5 0,0 0,10 -8,5" fill="url(#cubeLeft)"/>
    <polygon points="8,-5 0,0 0,10 8,5" fill="url(#cubeRight)"/>
  </g>

  <!-- cube 7 (tiny, drifting center-low) -->
  <g transform="translate(680,60)" opacity="0.35" filter="url(#cubeShadow)">
    <animateTransform attributeName="transform" type="translate" values="680,60; 680,50; 680,60" dur="5.2s" repeatCount="indefinite"/>
    <polygon points="0,-9 7,-4.5 0,0 -7,-4.5" fill="url(#cubeTop)"/>
    <polygon points="-7,-4.5 0,0 0,9 -7,4.5" fill="url(#cubeLeft)"/>
    <polygon points="7,-4.5 0,0 0,9 7,4.5" fill="url(#cubeRight)"/>
  </g>

  <!-- glass panel behind subtitle -->
  <rect x="330" y="182" width="540" height="38" rx="19" fill="#ffffff" opacity="0.035"/>
  <rect x="330" y="182" width="540" height="38" rx="19" fill="none" stroke="url(#panelStroke)" stroke-opacity="0.4" stroke-width="1"/>

  <!-- name: extruded shadow layer for depth -->
  <text x="605" y="165" font-family="'Segoe UI', Inter, sans-serif" font-size="76" font-weight="800" text-anchor="middle" fill="#020617" opacity="0.55">Abdul Rehman</text>
  <!-- name: gradient face with soft glow -->
  <text x="600" y="158" font-family="'Segoe UI', Inter, sans-serif" font-size="76" font-weight="800" text-anchor="middle" fill="url(#textGrad)" filter="url(#softGlow)">Abdul Rehman</text>

  <!-- shine sweep clipped to the name text -->
  <g clip-path="url(#nameClip)">
    <rect x="-500" y="60" width="300" height="140" fill="url(#shine)">
      <animate attributeName="x" values="-500;1400" dur="4.5s" begin="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <text x="600" y="205" font-family="'Segoe UI', Inter, sans-serif" font-size="19" font-weight="500" text-anchor="middle" fill="#94A3B8" letter-spacing="3">FOUNDER &amp; CEO @ STAYZA  ·  FULL-STACK &amp; DESKTOP DEVELOPER</text>

  <!-- animated accent line -->
  <rect x="500" y="228" width="200" height="2" fill="url(#textGrad)" opacity="0.85">
    <animate attributeName="width" values="0;200;200" dur="2s" begin="0.3s" fill="freeze"/>
    <animate attributeName="x" values="600;500;500" dur="2s" begin="0.3s" fill="freeze"/>
  </rect>

  <rect width="1200" height="320" fill="url(#vignette)"/>
</svg>
